<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>MSY-Commerce</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #f4efe6, #e8dccd);
      margin: 0;
    }

    #login {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    input {
      padding: 10px;
      width: 220px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: linear-gradient(135deg, #d2b48c, #c19a6b);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;
    }

    #app {
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #5a4634;
    }

    .nav {
      text-align: center;
      margin-bottom: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 15px;
      width: 220px;
      display: inline-block;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      vertical-align: top;
    }

    .product img {
      width: 150px;
      height: 150px;
      object-fit: cover;
    }

    .cart-item {
      background: white;
      margin: 10px auto;
      padding: 12px;
      width: 300px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div id="login">
  <div class="login-box">
    <h2>Inici de sessió</h2>
    <input type="text" id="user" placeholder="Usuari"><br>
    <input type="password" id="pass" placeholder="Contrasenya"><br>
    <button onclick="login()">Entrar</button>
    <p id="login-error" style="color:red;"></p>
  </div>
</div>

<div id="app" style="display:none;">
  <h1>MSY-Commerce 🛒</h1>

  <div class="nav">
    <button onclick="showProducts()">Productes</button>
    <button onclick="showCart()">Carret (<span id="cart-count">0</span>)</button>
  </div>

  <div id="content"></div>
</div>

<script src="app.js"></script>

</body>
</html>
