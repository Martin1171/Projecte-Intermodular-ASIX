---
- name: Demostració de loops amb Ansible
  hosts: ansible_cliente
  become: true

  tasks:
    # Loop bàsic amb llista de paquets
    - name: Instal·lar paquets addicionals
      apt:
        name: "{{ item }}"
        state: present
      loop:
        - htop
        - curl
        - wget
        - vim
        - net-tools

    # Loop amb diccionari - crear múltiples usuaris
    - name: Crear usuaris amb diferents configuracions
      user:
        name: "{{ item.name }}"
        state: present
        groups: "{{ item.groups }}"
        shell: "{{ item.shell }}"
        create_home: yes
      loop:
        - { name: 'developer1', groups: 'sudo', shell: '/bin/bash' }
        - { name: 'developer2', groups: 'www-data', shell: '/bin/bash' }
        - { name: 'monitor', groups: 'adm', shell: '/bin/bash' }

    # Loop per crear múltiples directoris
    - name: Crear estructura de directoris
      file:
        path: "{{ item }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'
      loop:
        - /var/www/html/assets
        - /var/www/html/css
        - /var/www/html/js
        - /var/www/html/images

    # Loop amb índex - crear fitxers numerats
    - name: Crear fitxers amb numeració
      copy:
        content: "Aquest és el fitxer número {{ item }}"
        dest: "/var/www/html/file_{{ item }}.txt"
      loop: "{{ range(1, 6) | list }}"
