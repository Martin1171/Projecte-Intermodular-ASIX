---
- name: Demostració de tags
  hosts: ansible_cliente
  become: true

  tasks:
    - name: Actualitzar cache de paquets
      apt:
        update_cache: yes
      tags:
        - always
        - system

    - name: Instal·lar serveis base
      apt:
        name: "{{ item }}"
        state: present
      loop:
        - nginx
        - git
        - curl
      tags:
        - system
        - packages

    - name: Configurar Nginx amb template
      template:
        src: ~/index.html.j2
        dest: /var/www/html/index.html
      tags:
        - web
        - config

    - name: Configurar firewall
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - 80
        - 443
      tags:
        - security
        - firewall

    - name: Crear backup de configuració
      command: tar -czf /backup/nginx_config_backup.tar.gz /etc/nginx/
      tags:
        - backup
        - never
