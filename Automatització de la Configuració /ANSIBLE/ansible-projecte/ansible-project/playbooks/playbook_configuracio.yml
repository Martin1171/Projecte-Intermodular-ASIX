---
- name: Gestió de configuració del sistema client
  hosts: ansible_cliente
  become: true
  gather_facts: yes

  tasks:
    # 1. Copiar template web dinàmic
    - name: Copiar template web amb variables dinàmiques
      template:
        src: ~/index.html.j2
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'
      notify: reiniciar nginx

    # 2. Afegir entrada al fitxer /etc/hosts
    - name: Afegir entrada del servidor Ansible a /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: "192.168.100.12 ansible-server"
        state: present
        backup: yes

    # 3. Assegurar que Nginx està actiu i habilitat
    - name: Assegurar que el servei Nginx està actiu
      service:
        name: nginx
        state: started
        enabled: true

    # 4. Crear tasca programada al cron per backup diari
    - name: Crear tasca cron per backup diari
      cron:
        name: "Backup diari del directori web"
        minute: "0"
        hour: "2"
        job: "tar -czf /backup/web_backup_$(date +\\%Y\\%m\\%d).tar.gz /var/www/html/ 2>/dev/null"
        state: present

    # 5. Crear directori per backups si no existeix
    - name: Crear directori per backups
      file:
        path: /backup
        state: directory
        owner: root
        group: root
        mode: '0755'

    # 6. Verificar que el lloc web és accessible
    - name: Verificar que el lloc web respon
      uri:
        url: http://192.168.100.13
        status_code: 200
      delegate_to: localhost
      register: result
      ignore_errors: yes

    - name: Mostrar resultat verificació
      debug:
        msg: "La web respon correctament"
      when: result.status == 200

  handlers:
    - name: reiniciar nginx
      service:
        name: nginx
        state: restarted
